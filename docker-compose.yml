version: "3.9"
services:
  db:
    image: mcr.microsoft.com/azure-sql-edge
    container_name: cute-calendar-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=123456Aa@$$
      - MSSQL_PID=Developer
    ports:
      - "1434:1433"
    volumes:
      - sqldata:/var/opt/mssql
    restart: unless-stopped

volumes:
  sqldata:
